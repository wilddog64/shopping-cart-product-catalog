---
# WARNING: This secret is for development/demo only.
# In production, use Vault or external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: product-catalog-secrets
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: product-catalog
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shopping-cart
type: Opaque
stringData:
  # Database credentials (dev only - use Vault in production)
  DB_USERNAME: "postgres"
  DB_PASSWORD: "CHANGE_ME"

  # RabbitMQ credentials (dev only - use Vault in production)
  RABBITMQ_USERNAME: "guest"
  RABBITMQ_PASSWORD: "CHANGE_ME"
