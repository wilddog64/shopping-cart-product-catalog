---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-catalog-config
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: product-catalog
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shopping-cart
data:
  # Application settings
  ENVIRONMENT: "production"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8080"

  # Database settings
  DB_HOST: "postgresql-products.shopping-cart-data.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "products"

  # RabbitMQ settings
  RABBITMQ_HOST: "rabbitmq.shopping-cart-data.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"

  # Vault settings
  VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
  VAULT_RABBITMQ_PATH: "rabbitmq"
  VAULT_ROLE: "product-catalog"

  # Rate limiting
  RATE_LIMIT_PER_MINUTE: "100"
  RATE_LIMIT_PER_SECOND: "20"
  RATE_LIMIT_BURST: "50"

  # OAuth2/OIDC Configuration (Keycloak SSO)
  OAUTH2_ENABLED: "true"
  OAUTH2_ISSUER_URI: "http://keycloak.identity.svc.cluster.local/realms/shopping-cart"
  OAUTH2_CLIENT_ID: "product-catalog"
